<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        label {
            display: inline-block;
            width: 80px;
            margin-bottom: 5px;
        }

        input[type="text"], input[type="number"] {
            width: 300px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<h1>1.1</h1>
<form method="post" action="functions.php">
    <label>Текст:</label>
    <input type="text" name="text" required><br>

    <label>Знайти:</label>
    <input type="text" name="find" required><br>

    <label>Замінити:</label>
    <input type="text" name="replace" required><br>

    <input type="submit" name="replaceSubmit">
</form>

<h1>1.2</h1>
<form method="post" action="functions.php">
    <label>Назви міст:</label>
    <input type="text" name="cities" required><br>
    <input type="submit" name="sortSubmit">
</form>

<h1>1.3</h1>
<form method="post" action="functions.php">
    <label>Повний шлях до файлу:</label>
    <input type="text" name="filePath" required><br>
    <input type="submit" name="fileSubmit">
</form>

<h1>1.4</h1>
<form method="post" action="functions.php">
    <label>Дата 1: </label>
    <input type="text" name="firstDate" required><br>

    <label>Дата 2: </label>
    <input type="text" name="secondDate" required><br>
    <input type="submit" name="dateSubmit">
</form>

<h1>1.5</h1>
<form method="post" action="functions.php">
    <label>Згенерувати пароль: </label>
    <input type="number" name="passwordLength" min="1" required><br>
    <input type="submit" name="createPasswordSubmit">
</form>
</body>
</html>
